eureka:
  client:
    enabled: false

spring:
  rabbitmq:
    host: rabbitmq-service
    port: 5672
    username: guest
    password: guest

  cloud:
    bus:
    enabled: true

  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&verifyServerCertificate=false
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}


  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate: 
      ddl-auto: create
    show-sql: true





